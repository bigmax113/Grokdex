name: Render Continue Agent Grok 4.3
version: 1.0.0
schema: v1

models:
  - name: Grok 4.3 long-context analysis
    provider: openai
    model: grok-4.3
    apiBase: https://api.x.ai/v1
    apiKey: ${{ secrets.XAI_API_KEY }}
    requestOptions:
      timeout: 600000
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply
      - summarize
    defaultCompletionOptions:
      temperature: 0.2
      contextLength: 1000000
      maxTokens: 20000

  - name: Grok Build 0.1 coding
    provider: openai
    model: grok-build-0.1
    apiBase: https://api.x.ai/v1
    apiKey: ${{ secrets.XAI_API_KEY }}
    requestOptions:
      timeout: 600000
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply
      - summarize
    defaultCompletionOptions:
      temperature: 0.2
      contextLength: 131072
      maxTokens: 8192

context:
  - provider: file
  - provider: code
  - provider: codebase
    params:
      nRetrieve: 30
      nFinal: 8
  - provider: diff
  - provider: terminal
  - provider: docs

rules:
  - Prefer Russian for explanations when the user writes in Russian.
  - This agent runs on Render, not on the user's local computer.
  - Never claim access to the user's local filesystem, local Docker, local browser, or local LM Studio.
  - Use the Render workspace filesystem and shell only.
  - Use Grok 4.3 for long-context analysis, large file review, broad refactors, and deep planning.
  - Switch to Grok Build 0.1 only when the task is implementation-heavy and requires code edits.
  - Never print secrets, tokens, cookies, SMTP credentials, or API keys.
  - Do not run destructive shell commands unless the user explicitly asks for them.
