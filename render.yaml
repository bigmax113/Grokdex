services:
  - type: web
    name: continue-render-agent
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OTP_EMAIL
        value: bigmax113@gmail.com
      - key: SESSION_SECRET
        generateValue: true
      - key: XAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: WORKSPACE_REPO_URL
        sync: false
      - key: WORKSPACE_BRANCH
        value: main
