services:
  - type: web
    name: continue-render-agent
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OTP_EMAIL
        value: bigmax113@gmail.com
      - key: SESSION_SECRET
        generateValue: true
      - key: XAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: WORKSPACE_REPO_URL
        sync: false
      - key: WORKSPACE_BRANCH
        value: main
      - key: REMOTE_WORKER_TOKEN
        sync: false
      - key: REMOTE_FILE_LIMIT_BYTES
        value: 26214400
      - key: REMOTE_TOTAL_LIMIT_BYTES
        value: 83886080
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 1WGbLfKoL8bYEi6fIXI2ktBPZmwAe86Pj
      - key: GOOGLE_DRIVE_AUTH_MODE
        value: oauth
      - key: GOOGLE_DRIVE_OAUTH_CLIENT_JSON_B64
        sync: false
      - key: GOOGLE_DRIVE_OAUTH_TOKEN_JSON_B64
        sync: false
      - key: GOOGLE_DRIVE_CONNECT_ENABLED
        value: "true"
      - key: GOOGLE_DRIVE_USE_PERSONAL_PROFILES
        value: "true"
      - key: OWNER_RESOURCE_FALLBACK_ENABLED
        value: "true"
      - key: GOOGLE_DRIVE_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_DRIVE_PROFILE_FOLDER_NAME
        value: Continue Render Agent
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_B64
        sync: false
