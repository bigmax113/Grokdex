<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Continue Render Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section id="login" class="card">
        <div class="mark">CR</div>
        <h1>Continue Render Agent</h1>
        <p class="muted">Доступ подтверждается 4-значным кодом, который отправляется владельцу.</p>
        <label>
          Email
          <input id="email" type="email" autocomplete="email" />
        </label>
        <button id="sendCode" type="button">Send code</button>
        <label>
          Code
          <input id="code" inputmode="numeric" maxlength="4" placeholder="0000" />
        </label>
        <button id="verifyCode" type="button">Unlock</button>
        <div id="loginStatus" class="status"></div>
      </section>

      <section id="app" class="app hidden">
        <header class="topbar">
          <div>
            <h1>Remote Continue</h1>
            <div id="runtime" class="muted"></div>
          </div>
          <div class="actions">
            <select id="model">
              <option value="grok-build">Grok Build 0.1 coding</option>
              <option value="grok-4.3">Grok 4.3 long context</option>
            </select>
            <label class="check"><input id="auto" type="checkbox" /> Auto edits</label>
            <button id="logout" type="button">Logout</button>
          </div>
        </header>
        <section class="chat">
          <pre id="output"></pre>
          <form id="promptForm" class="composer">
            <textarea id="prompt" rows="5" placeholder="Например: проанализируй репозиторий, найди архитектурные риски и предложи план исправлений."></textarea>
            <div class="composerActions">
              <button id="stop" type="button" disabled>Stop</button>
              <button id="send" type="submit">Run</button>
            </div>
          </form>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
