<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Continue Render Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section id="login" class="card">
        <div class="mark">CR</div>
        <h1>Continue Render Agent</h1>
        <p class="muted">Access is protected by a 4-digit code sent to the owner mailbox.</p>
        <label>
          Email
          <input id="email" type="email" autocomplete="email" />
        </label>
        <button id="sendCode" type="button">Send code</button>
        <label>
          Code
          <input id="code" inputmode="numeric" maxlength="4" placeholder="0000" />
        </label>
        <button id="verifyCode" type="button">Unlock</button>
        <div id="loginStatus" class="status"></div>
      </section>

      <section id="app" class="app hidden">
        <header class="topbar">
          <div>
            <h1>Remote Continue</h1>
            <div id="runtime" class="muted"></div>
          </div>
          <div class="actions">
            <label class="modelPicker">
              Model
              <select id="remoteModel">
                <option value="qwen">LM Studio Qwen</option>
                <option value="gemma-e2b">Gemma 4 E2B Q4</option>
                <option value="gemma-e4b">Gemma 4 E4B Q4</option>
                <option value="grok-build" disabled>Grok Build 0.1</option>
                <option value="grok-general" disabled>Grok 4.3</option>
              </select>
            </label>
            <label class="check"><input id="auto" type="checkbox" /> Auto edits</label>
            <button id="logout" type="button">Logout</button>
          </div>
        </header>

        <section class="workbench">
          <aside class="chatRail">
            <div class="railHeader">
              <div class="mark small">AI</div>
              <div>
                <strong>Remote Agent</strong>
                <div class="muted">Qwen + local worker</div>
              </div>
            </div>
            <button id="newChat" class="newChatButton" type="button">New chat</button>
            <div id="chatList" class="chatList"></div>
          </aside>

          <section class="chat">
            <div class="chatTitleRow">
              <label>
                Chat
                <input id="chatTitle" type="text" value="New chat" readonly />
              </label>
            </div>
            <div id="output" class="messageList" aria-live="polite">
              <div id="dropHint" class="dropHint hidden">Drop files here</div>
            </div>
            <div id="runStatus" class="runStatus hidden">
              <span class="spinner" aria-hidden="true"></span>
              <span id="runStatusText">Idle</span>
            </div>
            <div id="downloadBar" class="downloadBar hidden"></div>
            <div id="attachmentBar" class="attachmentBar hidden"></div>
            <form id="promptForm" class="composer">
              <textarea id="prompt" rows="5" placeholder="Ask through the local worker..."></textarea>
              <div class="composerActions">
                <input id="chatFiles" class="hidden" type="file" multiple />
                <button id="attachFiles" type="button" title="Attach files">+</button>
                <button id="stop" type="button" disabled>Stop</button>
                <button id="send" type="submit">Send to local worker</button>
              </div>
            </form>
          </section>

          <aside class="remotePanel">
            <div class="panelHeader">
              <h2>Document jobs</h2>
              <button id="refreshRemoteTasks" type="button">Refresh</button>
            </div>
            <div class="storageBox">
              <div>
                <div id="driveProfile" class="storageTitle">Storage</div>
                <div class="muted">Choose one Drive folder for future jobs.</div>
              </div>
              <button id="connectDrive" type="button">Use my Drive</button>
            </div>
            <label>
              Drive folder URL or ID
              <input id="driveFolder" type="text" placeholder="https://drive.google.com/drive/folders/..." />
            </label>
            <form id="remoteTaskForm" class="remoteForm">
              <label>
                Task
                <textarea id="remotePrompt" rows="4" placeholder="Translate, analyze, extract, convert..."></textarea>
              </label>
              <label>
                Files or archives
                <input id="remoteFiles" type="file" multiple />
              </label>
              <label>
                Folder as dataset
                <input id="remoteFolder" type="file" multiple webkitdirectory directory />
              </label>
              <button id="createRemoteTask" type="submit">Create job</button>
            </form>
            <div id="remoteStatus" class="status"></div>
            <div id="remoteTasks" class="taskList"></div>
          </aside>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
